<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Task Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f4f8; color: #1a1a2e; min-height: 100vh; }

    /* Header */
    header { background: #16213e; color: white; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.3rem; font-weight: 600; }
    .badge { background: #0f3460; font-size: 0.72rem; padding: 2px 10px; border-radius: 999px; }
    .today-label { font-size: 0.78rem; color: #8fa3c0; }

    /* Nav */
    nav { background: white; border-bottom: 1px solid #e2e8f0; padding: 0 2rem; display: flex; gap: 0; }
    .nav-btn { background: none; border: none; border-bottom: 2px solid transparent; padding: 0.75rem 1.2rem; font-size: 0.88rem; cursor: pointer; color: #666; font-family: system-ui, sans-serif; }
    .nav-btn.active { color: #0f3460; border-bottom-color: #0f3460; font-weight: 600; }

    /* Layout */
    main { max-width: 820px; margin: 1.5rem auto; padding: 0 1rem; }
    .card { background: white; border-radius: 12px; padding: 1.4rem; margin-bottom: 1.2rem; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .card-title { font-size: 0.75rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }
    .view { display: none; }
    .view.active { display: block; }

    /* Stats */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.2rem; }
    .stat-card { background: white; border-radius: 10px; padding: 1rem 1.2rem; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .stat-num { font-size: 1.9rem; font-weight: 700; }
    .stat-label { font-size: 0.72rem; color: #888; margin-top: 2px; }

    /* Progress */
    .progress-bar { height: 7px; background: #e8edf5; border-radius: 999px; overflow: hidden; margin-top: 8px; }
    .progress-fill { height: 100%; background: #0f3460; border-radius: 999px; transition: width 0.4s; }

    /* Form */
    .form-row { display: grid; grid-template-columns: 2fr 1.2fr 1.2fr 1fr auto; gap: 0.7rem; align-items: end; }
    label { display: block; font-size: 0.78rem; color: #666; margin-bottom: 4px; }
    input, select { width: 100%; padding: 0.48rem 0.75rem; border: 1.5px solid #dde1e7; border-radius: 8px; font-size: 0.88rem; outline: none; font-family: system-ui, sans-serif; background: white; color: #1a1a2e; }
    input:focus, select:focus { border-color: #0f3460; }
    .add-btn { background: #0f3460; color: white; border: none; border-radius: 8px; padding: 0.52rem 1.1rem; font-size: 0.88rem; cursor: pointer; white-space: nowrap; }
    .add-btn:hover { background: #16213e; }

    /* Filters */
    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
    .chip { font-size: 0.78rem; padding: 4px 13px; border-radius: 999px; border: 1.5px solid #dde1e7; cursor: pointer; background: #f8f9fc; color: #666; }
    .chip.active { background: #e8edf5; border-color: #0f3460; color: #0f3460; font-weight: 600; }

    /* Task items */
    .task-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 6px; background: #f8f9fc; }
    .task-item.done .task-title { text-decoration: line-through; color: #aaa; }
    .task-title { flex: 1; font-size: 0.92rem; font-weight: 500; }
    .tag { font-size: 0.72rem; padding: 2px 9px; border-radius: 999px; white-space: nowrap; }
    .tag-subj { background: #e8edf5; color: #0f3460; }
    .tag-high { background: #fdecea; color: #b91c1c; }
    .tag-med  { background: #fef3c7; color: #92400e; }
    .tag-low  { background: #dcfce7; color: #166534; }
    .tag-due  { font-size: 0.72rem; color: #999; }
    .tag-overdue { color: #b91c1c; font-weight: 600; }
    .tag-today { color: #92400e; font-weight: 600; }
    .icon-btn { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 4px 5px; border-radius: 6px; }
    .icon-btn:hover { background: #e8edf5; }
    .empty { text-align: center; color: #bbb; padding: 2rem; font-size: 0.88rem; }

    /* Calendar */
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .cal-nav-title { font-size: 1rem; font-weight: 600; color: #16213e; }
    .cal-nav-btn { background: #f0f4f8; border: none; border-radius: 8px; padding: 5px 14px; cursor: pointer; font-size: 1rem; }
    .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
    .cal-day-label { font-size: 0.72rem; color: #999; text-align: center; padding: 4px 0; font-weight: 600; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-cell { min-height: 62px; border-radius: 8px; border: 1px solid #e8edf5; padding: 5px; background: white; }
    .cal-cell.other-month { background: #f8f9fc; opacity: 0.55; }
    .cal-cell.today { border-color: #0f3460; border-width: 2px; }
    .cal-date { font-size: 0.72rem; color: #888; font-weight: 600; margin-bottom: 3px; }
    .cal-cell.today .cal-date { color: #0f3460; }
    .cal-dot { font-size: 0.65rem; padding: 1px 5px; border-radius: 4px; margin-bottom: 2px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; line-height: 1.5; }
    .cal-dot-high { background: #fdecea; color: #b91c1c; }
    .cal-dot-med  { background: #fef3c7; color: #92400e; }
    .cal-dot-low  { background: #dcfce7; color: #166534; }
    .cal-dot-done { background: #f0f4f8; color: #aaa; text-decoration: line-through; }

    /* Subjects */
    .subject-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f0f4f8; }
    .subject-row:last-child { border-bottom: none; }
    .subject-name { flex: 1; font-size: 0.9rem; font-weight: 500; }
    .subject-count { font-size: 0.78rem; color: #888; min-width: 36px; text-align: right; }
    .section-tabs { display: flex; border-bottom: 1px solid #e8edf5; margin-bottom: 1rem; }
    .section-tab { background: none; border: none; border-bottom: 2px solid transparent; padding: 7px 14px; font-size: 0.85rem; cursor: pointer; color: #888; font-family: system-ui, sans-serif; }
    .section-tab.active { color: #0f3460; border-bottom-color: #0f3460; font-weight: 600; }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:1rem">
    <h1>Student Task Manager</h1>
    <span class="badge">Auto-deployed via CI/CD</span>
  </div>
  <span class="today-label" id="today-label"></span>
</header>

<nav>
  <button class="nav-btn active" onclick="switchView('dashboard', this)">Dashboard</button>
  <button class="nav-btn" onclick="switchView('tasks', this)">Tasks</button>
  <button class="nav-btn" onclick="switchView('calendar', this)">Calendar</button>
  <button class="nav-btn" onclick="switchView('subjects', this)">By Subject</button>
</nav>

<main>

  <!-- DASHBOARD -->
  <div id="view-dashboard" class="view active">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num" id="s-total" style="color:#0f3460">0</div><div class="stat-label">Total tasks</div></div>
      <div class="stat-card"><div class="stat-num" id="s-done"  style="color:#166534">0</div><div class="stat-label">Completed</div></div>
      <div class="stat-card"><div class="stat-num" id="s-overdue" style="color:#b91c1c">0</div><div class="stat-label">Overdue</div></div>
      <div class="stat-card"><div class="stat-num" id="s-today" style="color:#92400e">0</div><div class="stat-label">Due today</div></div>
    </div>

    <div class="card">
      <div class="card-title">Overall progress</div>
      <div style="display:flex;justify-content:space-between;font-size:0.88rem">
        <span id="prog-label">0 of 0 tasks done</span>
        <span id="prog-pct" style="font-weight:700;color:#0f3460">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>

    <div class="card">
      <div class="card-title">Upcoming — next 7 days</div>
      <div id="upcoming-list"><div class="empty">No upcoming tasks</div></div>
    </div>

    <div class="card">
      <div class="card-title">Overdue</div>
      <div id="overdue-list"><div class="empty">Nothing overdue</div></div>
    </div>
  </div>

  <!-- TASKS -->
  <div id="view-tasks" class="view">
    <div class="card">
      <div class="card-title">Add a task</div>
      <div class="form-row">
        <div><label>Task title</label><input id="f-title" type="text" placeholder="e.g. Complete assignment 3"></div>
        <div><label>Subject</label><input id="f-subject" type="text" placeholder="e.g. DevOps"></div>
        <div><label>Due date</label><input id="f-due" type="date"></div>
        <div><label>Priority</label>
          <select id="f-priority">
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="low">Low</option>
          </select>
        </div>
        <div><label>&nbsp;</label><button class="add-btn" onclick="addTask()">+ Add</button></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">All tasks</div>
      <div class="filter-row">
        <button class="chip active" onclick="setFilter('all', this)">All</button>
        <button class="chip" onclick="setFilter('pending', this)">Pending</button>
        <button class="chip" onclick="setFilter('done', this)">Done</button>
        <button class="chip" onclick="setFilter('high', this)">High priority</button>
        <button class="chip" onclick="setFilter('overdue', this)">Overdue</button>
      </div>
      <div id="task-list"><div class="empty">Loading tasks...</div></div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div id="view-calendar" class="view">
    <div class="card">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calPrev()">&#8592;</button>
        <span class="cal-nav-title" id="cal-title"></span>
        <button class="cal-nav-btn" onclick="calNext()">&#8594;</button>
      </div>
      <div class="cal-header">
        <div class="cal-day-label">Sun</div>
        <div class="cal-day-label">Mon</div>
        <div class="cal-day-label">Tue</div>
        <div class="cal-day-label">Wed</div>
        <div class="cal-day-label">Thu</div>
        <div class="cal-day-label">Fri</div>
        <div class="cal-day-label">Sat</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <!-- SUBJECTS -->
  <div id="view-subjects" class="view">
    <div class="card">
      <div class="section-tabs">
        <button class="section-tab active" onclick="setSubjectTab('breakdown', this)">Breakdown</button>
        <button class="section-tab" onclick="setSubjectTab('history', this)">Completed history</button>
      </div>
      <div id="subject-breakdown"></div>
      <div id="subject-history" style="display:none"></div>
    </div>
  </div>

</main>

<script>
  let tasks = [];
  let currentFilter = 'all';
  let calYear, calMonth;

  const today = new Date();
  today.setHours(0, 0, 0, 0);
  calYear = today.getFullYear();
  calMonth = today.getMonth();

  document.getElementById('today-label').textContent =
    today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  function todayStr() { return today.toISOString().slice(0, 10); }

  async function loadTasks() {
    const res = await fetch('/api/tasks');
    tasks = await res.json();
    tasks = tasks.map(t => ({ ...t, priority: t.priority || 'medium' }));
    refresh();
  }

  function refresh() {
    updateStats();
    renderDashboard();
    renderTaskList();
    renderCalendar();
    renderSubjects();
  }

  function updateStats() {
    const td = todayStr();
    const done = tasks.filter(t => t.done).length;
    const pct = tasks.length ? Math.round(done / tasks.length * 100) : 0;
    document.getElementById('s-total').textContent = tasks.length;
    document.getElementById('s-done').textContent = done;
    document.getElementById('s-overdue').textContent = tasks.filter(t => !t.done && t.due_date && t.due_date < td).length;
    document.getElementById('s-today').textContent = tasks.filter(t => !t.done && t.due_date === td).length;
    document.getElementById('prog-label').textContent = `${done} of ${tasks.length} tasks done`;
    document.getElementById('prog-pct').textContent = pct + '%';
    document.getElementById('prog-fill').style.width = pct + '%';
  }

  function renderDashboard() {
    const td = todayStr();
    const in7 = new Date(today);
    in7.setDate(today.getDate() + 7);
    const in7str = in7.toISOString().slice(0, 10);

    const upcoming = tasks
      .filter(t => !t.done && t.due_date && t.due_date >= td && t.due_date <= in7str)
      .sort((a, b) => a.due_date.localeCompare(b.due_date));

    const overdue = tasks
      .filter(t => !t.done && t.due_date && t.due_date < td)
      .sort((a, b) => a.due_date.localeCompare(b.due_date));

    document.getElementById('upcoming-list').innerHTML =
      upcoming.length ? upcoming.map(taskHTML).join('') : '<div class="empty">No upcoming tasks</div>';
    document.getElementById('overdue-list').innerHTML =
      overdue.length ? overdue.map(taskHTML).join('') : '<div class="empty">Nothing overdue</div>';
  }

  function priorityTag(p) {
    if (p === 'high') return '<span class="tag tag-high">High</span>';
    if (p === 'low')  return '<span class="tag tag-low">Low</span>';
    return '<span class="tag tag-med">Med</span>';
  }

  function dueTag(due) {
    if (!due) return '';
    const td = todayStr();
    if (due < td)  return `<span class="tag-due tag-overdue">Overdue &middot; ${due}</span>`;
    if (due === td) return `<span class="tag-due tag-today">Due today</span>`;
    return `<span class="tag-due">${due}</span>`;
  }

  function taskHTML(t) {
    return `<div class="task-item${t.done ? ' done' : ''}" id="task-${t.id}">
      <button class="icon-btn" onclick="toggleDone(${t.id})">${t.done ? '✅' : '⬜'}</button>
      <span class="task-title">${t.title}</span>
      <span class="tag tag-subj">${t.subject}</span>
      ${priorityTag(t.priority)}
      ${dueTag(t.due_date)}
      <button class="icon-btn" onclick="deleteTask(${t.id})">🗑</button>
    </div>`;
  }

  function renderTaskList() {
    const td = todayStr();
    let filtered = tasks;
    if (currentFilter === 'pending') filtered = tasks.filter(t => !t.done);
    else if (currentFilter === 'done')    filtered = tasks.filter(t => t.done);
    else if (currentFilter === 'high')    filtered = tasks.filter(t => t.priority === 'high');
    else if (currentFilter === 'overdue') filtered = tasks.filter(t => !t.done && t.due_date && t.due_date < td);
    const el = document.getElementById('task-list');
    el.innerHTML = filtered.length ? filtered.map(taskHTML).join('') : '<div class="empty">No tasks here</div>';
  }

  function renderCalendar() {
    const monthStr = new Date(calYear, calMonth, 1)
      .toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    document.getElementById('cal-title').textContent = monthStr;

    const firstDay    = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const daysInPrev  = new Date(calYear, calMonth, 0).getDate();

    const byDate = {};
    tasks.forEach(t => {
      if (t.due_date) {
        if (!byDate[t.due_date]) byDate[t.due_date] = [];
        byDate[t.due_date].push(t);
      }
    });

    let cells = '';

    for (let i = 0; i < firstDay; i++) {
      cells += `<div class="cal-cell other-month"><div class="cal-date">${daysInPrev - firstDay + 1 + i}</div></div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const ds = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const isToday = ds === todayStr();
      const dayTasks = byDate[ds] || [];
      const dots = dayTasks.slice(0, 3).map(t => {
        const cls = t.done ? 'cal-dot-done'
          : t.priority === 'high' ? 'cal-dot-high'
          : t.priority === 'low'  ? 'cal-dot-low'
          : 'cal-dot-med';
        return `<div class="cal-dot ${cls}">${t.title}</div>`;
      }).join('');
      const more = dayTasks.length > 3 ? `<div class="cal-dot" style="color:#aaa">+${dayTasks.length - 3} more</div>` : '';
      cells += `<div class="cal-cell${isToday ? ' today' : ''}"><div class="cal-date">${d}</div>${dots}${more}</div>`;
    }

    const total = firstDay + daysInMonth;
    const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
    for (let i = 1; i <= remaining; i++) {
      cells += `<div class="cal-cell other-month"><div class="cal-date">${i}</div></div>`;
    }

    document.getElementById('cal-grid').innerHTML = cells;
  }

  function renderSubjects() {
    const subjects = {};
    tasks.forEach(t => {
      if (!subjects[t.subject]) subjects[t.subject] = { total: 0, done: 0 };
      subjects[t.subject].total++;
      if (t.done) subjects[t.subject].done++;
    });

    const keys = Object.keys(subjects).sort();
    const bd = document.getElementById('subject-breakdown');
    bd.innerHTML = keys.length ? keys.map(s => {
      const { total, done } = subjects[s];
      const pct = total ? Math.round(done / total * 100) : 0;
      return `<div class="subject-row">
        <span class="subject-name">${s}</span>
        <span class="subject-count">${done}/${total}</span>
        <div style="width:130px">
          <div class="progress-bar" style="margin-top:0">
            <div class="progress-fill" style="width:${pct}%"></div>
          </div>
        </div>
        <span style="font-size:0.78rem;font-weight:700;color:#0f3460;min-width:34px;text-align:right">${pct}%</span>
      </div>`;
    }).join('') : '<div class="empty">No subjects yet</div>';

    const doneTasks = tasks.filter(t => t.done)
      .sort((a, b) => (b.due_date || '').localeCompare(a.due_date || ''));
    document.getElementById('subject-history').innerHTML =
      doneTasks.length ? doneTasks.map(taskHTML).join('') : '<div class="empty">No completed tasks yet</div>';
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTaskList();
  }

  function calPrev() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); }
  function calNext() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); }

  function switchView(v, btn) {
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + v).classList.add('active');
    btn.classList.add('active');
  }

  function setSubjectTab(t, btn) {
    document.querySelectorAll('.section-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('subject-breakdown').style.display = t === 'breakdown' ? 'block' : 'none';
    document.getElementById('subject-history').style.display   = t === 'history'   ? 'block' : 'none';
  }

  async function addTask() {
    const title    = document.getElementById('f-title').value.trim();
    const subject  = document.getElementById('f-subject').value.trim();
    const due_date = document.getElementById('f-due').value;
    const priority = document.getElementById('f-priority').value;
    if (!title || !subject) { alert('Please enter a title and subject'); return; }
    await fetch('/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, subject, due_date, priority })
    });
    document.getElementById('f-title').value   = '';
    document.getElementById('f-subject').value = '';
    document.getElementById('f-due').value     = '';
    loadTasks();
  }

  async function deleteTask(id) {
    await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
    loadTasks();
  }

  async function toggleDone(id) {
    await fetch(`/api/tasks/${id}/done`, { method: 'PUT' });
    loadTasks();
  }

  loadTasks();
</script>
</body>
</html>
