<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Task Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f4f8; color: #1a1a2e; min-height: 100vh; }
    header { background: #16213e; color: white; padding: 1.2rem 2rem; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    .badge { background: #0f3460; font-size: 0.75rem; padding: 2px 10px; border-radius: 999px; }
    main { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: #16213e; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 0.75rem; align-items: end; }
    label { display: block; font-size: 0.8rem; color: #555; margin-bottom: 4px; }
    input { width: 100%; padding: 0.5rem 0.75rem; border: 1.5px solid #dde1e7; border-radius: 8px; font-size: 0.9rem; outline: none; }
    button.add-btn { background: #0f3460; color: white; border: none; border-radius: 8px; padding: 0.55rem 1.2rem; font-size: 0.9rem; cursor: pointer; }
    button.add-btn:hover { background: #16213e; }
    .task-list { list-style: none; }
    .task-item { display: flex; align-items: center; gap: 1rem; padding: 0.85rem 1rem; border-radius: 8px; margin-bottom: 0.5rem; background: #f8f9fc; }
    .task-item.done .task-title { text-decoration: line-through; color: #999; }
    .task-title { flex: 1; font-size: 0.95rem; font-weight: 500; }
    .task-subject { font-size: 0.78rem; color: #0f3460; background: #e8edf5; padding: 2px 10px; border-radius: 999px; }
    .task-due { font-size: 0.78rem; color: #888; min-width: 80px; }
    .icon-btn { background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 4px; border-radius: 6px; }
    .empty { text-align: center; color: #aaa; padding: 2rem; font-size: 0.9rem; }
    .stats { display: flex; gap: 1rem; }
    .stat { flex: 1; text-align: center; }
    .stat-num { font-size: 1.8rem; font-weight: 700; color: #0f3460; }
    .stat-label { font-size: 0.78rem; color: #888; margin-top: 2px; }
  </style>
</head>
<body>
  <header>
    <h1>Student Task Manager</h1>
    <span class="badge">Auto-deployed via CI/CD</span>
  </header>
  <main>
    <div class="card">
      <h2>Add a task</h2>
      <div class="form-row">
        <div><label>Task title</label><input id="title" type="text" placeholder="e.g. Complete assignment 3"></div>
        <div><label>Subject</label><input id="subject" type="text" placeholder="e.g. DevOps"></div>
        <div><label>Due date</label><input id="due" type="date"></div>
        <div><label>&nbsp;</label><button class="add-btn" onclick="addTask()">+ Add</button></div>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <h2>Your tasks</h2>
        <div class="stats">
          <div class="stat"><div class="stat-num" id="total">0</div><div class="stat-label">Total</div></div>
          <div class="stat"><div class="stat-num" id="done-count">0</div><div class="stat-label">Done</div></div>
        </div>
      </div>
      <ul class="task-list" id="task-list"><li class="empty">Loading tasks...</li></ul>
    </div>
  </main>
  <script>
    async function loadTasks() {
      const res = await fetch('/api/tasks');
      const tasks = await res.json();
      document.getElementById('total').textContent = tasks.length;
      document.getElementById('done-count').textContent = tasks.filter(t => t.done).length;
      const list = document.getElementById('task-list');
      if (!tasks.length) { list.innerHTML = '<li class="empty">No tasks yet. Add one above!</li>'; return; }
      list.innerHTML = tasks.map(t => `
        <li class="task-item ${t.done ? 'done' : ''}" id="task-${t.id}">
          <button class="icon-btn" onclick="toggleDone(${t.id})">${t.done ? '✅' : '⬜'}</button>
          <span class="task-title">${t.title}</span>
          <span class="task-subject">${t.subject}</span>
          <span class="task-due">${t.due_date || ''}</span>
          <button class="icon-btn" onclick="deleteTask(${t.id})">🗑</button>
        </li>`).join('');
    }
    async function addTask() {
      const title = document.getElementById('title').value.trim();
      const subject = document.getElementById('subject').value.trim();
      const due_date = document.getElementById('due').value;
      if (!title || !subject) { alert('Please enter a title and subject'); return; }
      await fetch('/api/tasks', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({title, subject, due_date}) });
      document.getElementById('title').value = '';
      document.getElementById('subject').value = '';
      document.getElementById('due').value = '';
      loadTasks();
    }
    async function deleteTask(id) { await fetch(`/api/tasks/${id}`, {method: 'DELETE'}); loadTasks(); }
    async function toggleDone(id) { await fetch(`/api/tasks/${id}/done`, {method: 'PUT'}); loadTasks(); }
    loadTasks();
  </script>
</body>
</html>
